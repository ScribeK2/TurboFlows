name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: turboflows
          POSTGRES_PASSWORD: turboflows_test
          POSTGRES_DB: turboflows_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://turboflows:turboflows_test@localhost:5432/turboflows_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
          bundler-cache: true

      - name: Set up database
        run: bundle exec rails db:schema:load

      - name: Run tests
        run: bundle exec rails test

      - name: Run RuboCop
        run: |
          touch .rubocop_todo.yml
          bundle exec rubocop --format github
