# config/database.yml
# -------------------------------------------------
# 1. Default settings (shared by dev / test)
# -------------------------------------------------
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

# -------------------------------------------------
# 2. Development – uses SQLite (local file)
# -------------------------------------------------
development:
  primary:
    <<: *default
    database: db/development.sqlite3
  queue:
    <<: *default
    database: db/development_queue.sqlite3
    migrations_paths: db/queue_migrate

# -------------------------------------------------
# 3. Test – uses SQLite locally, PostgreSQL in CI
# -------------------------------------------------
# If DATABASE_URL is set, use PostgreSQL (for CI testing)
# Otherwise, use SQLite for fast local development
test:
  <% if ENV["DATABASE_URL"] %>
  primary:
    adapter: postgresql
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 4 } %>
  queue:
    adapter: postgresql
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 4 } %>
    migrations_paths: db/queue_migrate
  <% else %>
  primary:
    <<: *default
    database: db/test.sqlite3
    timeout: 15000
    pragma:
      journal_mode: wal
  queue:
    <<: *default
    database: db/test_queue.sqlite3
    migrations_paths: db/queue_migrate
  <% end %>

# -------------------------------------------------
# 4. Production – SQLite (ONCE self-hosted)
# -------------------------------------------------
# All databases stored in storage/db/ which maps to /rails/storage/db/
# in Docker. ONCE mounts a persistent volume at /rails/storage.
# WAL mode via default_transaction_mode: immediate for write concurrency.
# Separate DB files for cache/queue/cable isolate write contention.
production:
  primary:
    <<: *default
    database: storage/db/production.sqlite3
    default_transaction_mode: immediate
    busy_timeout: 5000
  cache:
    <<: *default
    database: storage/db/production_cache.sqlite3
    default_transaction_mode: immediate
    busy_timeout: 5000
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/db/production_queue.sqlite3
    default_transaction_mode: immediate
    busy_timeout: 5000
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/db/production_cable.sqlite3
    default_transaction_mode: immediate
    busy_timeout: 5000
    migrations_paths: db/cable_migrate
