production:
  cleanup_scenarios:
    class: CleanupScenariosJob
    schedule: "0 3 * * *"
  cleanup_drafts:
    class: CleanupDraftsJob
    schedule: "0 3 * * *"
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
  cleanup_stale_presences:
    class: CleanupStalePresencesJob
    schedule: every 5 minutes
