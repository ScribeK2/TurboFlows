service: turboflows

image: your-registry/turboflows

servers:
  web:
    hosts:
      - your-server.com
    cmd: bin/rails server

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_PASSWORD

volumes:
  - storage:/rails/storage

accessories:
  scheduler:
    image: your-registry/turboflows
    host: your-server.com
    cmd: bash -c "bin/rails cleanup:scenarios cleanup:drafts && while true; do sleep 86400; bin/rails cleanup:scenarios cleanup:drafts; done"
    volumes:
      - storage:/rails/storage

