service: turboflows

image: your-registry/turboflows

servers:
  web:
    hosts:
      - your-server.com
    cmd: bin/rails server

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_PASSWORD

volumes:
  - storage:/rails/storage

# Scheduler accessory removed — cleanup jobs now run via Solid Queue
# (in-process via puma plugin, configured in config/recurring.yml)

